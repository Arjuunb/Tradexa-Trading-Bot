# Example config — adapt and load in your own runner script if you prefer
# config-driven setup over the Python examples in examples/.

broker:
  venue: ccxt          # paper | ccxt | alpaca | oanda
  exchange_id: binance
  sandbox: true        # use testnet
  # api_key:    set via env var BINANCE_TESTNET_KEY
  # api_secret: set via env var BINANCE_TESTNET_SECRET

symbol: BTC/USDT
timeframe: 1h
warmup_bars: 300

strategy:
  name: support_resistance_rejection
  params:
    pivot: 3
    lookback: 100
    cluster_pct: 0.0025
    max_zone_age: 300
    rr_target: 2.0
    sl_buffer_pct: 0.0005
    min_touches: 2

risk:
  risk_per_trade_pct: 0.01
  max_open_positions: 3
  max_daily_loss_pct: 0.03
  max_position_pct: 0.25
  cooldown_bars_after_loss: 5

mode: paper            # paper | live | backtest
dry_run: false
