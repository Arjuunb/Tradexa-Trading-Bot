# Render Blueprint — one-click deploy of the Automation Hub backend.
# In Render: New + → "Blueprint" → pick this repo. It builds the Dockerfile and
# runs the FastAPI app with the autonomous engine. Then set VITE_API_BASE on
# Vercel to the URL Render gives you (e.g. https://automation-hub-api.onrender.com).
services:
  - type: web
    name: automation-hub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HUB_AUTO_ENGINE
        value: "1"
      # Paper-trade the validated DecisionBrain on real candles instead of
      # synthetic data, so the trade journal reflects real market decisions.
      - key: HUB_USE_LIVE_DATA
        value: "1"
      # Data venue: Binance answers HTTP 451 to many cloud/datacenter IPs
      # (including Render's), so default to Kraken which serves them. Existing
      # services must add this env var manually — blueprint sync is not retroactive.
      - key: HUB_EXCHANGE
        value: "kraken"
      # --- embed the dashboard inside the Tradexa app (iframe) ---
      # SameSite=None lets the session cookie work inside a cross-site iframe
      # (HTTPS only); HUB_FRAME_ANCESTORS restricts WHO may frame the dashboard.
      # Fill in your Tradexa origin, e.g. "https://tradexa.vercel.app".
      - key: HUB_COOKIE_SAMESITE
        value: "none"
      - key: HUB_FRAME_ANCESTORS
        sync: false
      # Set a real secret here and use the SAME value for VITE_WEBHOOK_SECRET on
      # Vercel so the Pause/Stop/Start controls work from the deployed UI.
      - key: HUB_WEBHOOK_SECRET
        sync: false
      # --- dashboard login (defaults are admin/admin — CHANGE THESE) ---
      # Render prompts you to fill these at deploy; leaving them unset falls back
      # to insecure dev defaults on a public URL.
      - key: HUB_USERNAME
        sync: false
      - key: HUB_PASSWORD
        sync: false
      # Session-cookie signing key — Render generates a strong random value so it
      # is never the insecure dev default. You never need to see it.
      - key: HUB_SECRET
        generateValue: true
      # --- risk guards active by default in production ---
      # Daily-loss kill switch (3% of starting equity; resets each UTC day).
      # Off by default in code (0) so tests stay deterministic; on here so a
      # real deploy runs with the guard engaged and Safety Center shows it green.
      - key: HUB_MAX_DAILY_LOSS
        value: "0.03"
      # --- FREE persistence (so capital/trades survive redeploy without a paid
      # disk): create a free Supabase project, run automation-hub/data/
      # ledger_schema.sql, then set these two. Leave blank to skip.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Optional: set your starting capital here so it persists across redeploys
      # for free (env config, not disk). Defaults to 10000.
      - key: HUB_STARTING_CASH
        sync: false
    # --- FULL persistence across redeploys (recommended for real users) ---
    # A Supabase project (above) preserves TRADE HISTORY only. To make the paper
    # account, user accounts, saved settings and AI memory ALSO survive every
    # redeploy, mount a persistent disk and point HUB_DATA_DIR at it. Uncomment
    # the two blocks below. NOTE: attaching a disk moves the service off the
    # `free` plan onto a paid instance (Render requirement) — change `plan: free`
    # above to `plan: starter` when you enable this.
    #
    #   - key: HUB_DATA_DIR
    #     value: /var/hubdata
    #
    # disk:
    #   name: hub-data
    #   mountPath: /var/hubdata
    #   sizeGB: 1
    #
    # Until then, the app logs a loud STORAGE DURABILITY WARNING at boot and the
    # Bot Health page shows the current tier (disk / supabase / ephemeral) so you
    # always know exactly what survives a redeploy.
